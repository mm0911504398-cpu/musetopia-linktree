<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="1; url=https://maps.app.goo.gl/biH7BBWtZdeTBES28?g_st=com.google.maps.preview.copy">
  <title>導航｜慕亞音樂藝術</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f4efe7;
      color: #24201b;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    main {
      width: min(100%, 360px);
      padding: 38px 24px;
      border: 1px solid #e4d9c8;
      border-radius: 24px;
      background: #fbfaf7;
      box-shadow: 0 18px 44px rgba(46, 38, 27, .14);
      text-align: center;
    }

    svg {
      width: 42px;
      height: 42px;
      margin-bottom: 18px;
      color: #b08a45;
      stroke: currentColor;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: .04em;
    }

    p {
      margin: 12px 0 24px;
      color: #8f8068;
      font-size: 14px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      border: 1px solid #c4a36e;
      border-radius: 999px;
      background: #fff7e8;
      color: #24201b;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 21L20 4L3 12L10.5 13.5L12 21Z" stroke-width="2" stroke-linejoin="round"/>
    </svg>
    <h1>導航</h1>
    <p>正在前往 Google Maps</p>
    <a href="https://maps.app.goo.gl/biH7BBWtZdeTBES28?g_st=com.google.maps.preview.copy">前往導航</a>
  </main>
  <script>
    window.setTimeout(function () {
      window.location.href = 'https://maps.app.goo.gl/biH7BBWtZdeTBES28?g_st=com.google.maps.preview.copy';
    }, 500);
  </script>
</body>
</html>
